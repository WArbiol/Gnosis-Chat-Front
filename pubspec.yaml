name: gnosis_chat
description: "RAG-powered chat over 90 gnostic PDFs"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP
  dio: ^5.7.0

  # Auth
  supabase_flutter: ^2.8.2

  # Storage
  flutter_secure_storage: ^9.2.4

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.5.3

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  share_plus: ^10.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  flutter_dotenv: ^6.0.0
  flutter_markdown: ^0.7.7+1
  syncfusion_flutter_pdfviewer: ^26.1.1
  url_launcher: ^6.3.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
